{% extends "base.html" %}
{% block content %}
<div class="topbar">
    <div>
        <h1>Reports</h1>
        <p>Date-wise email scanning report.</p>
    </div>
</div>

<div class="glass-card">
    <table class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Total Scans</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row.day }}</td>
                <td>{{ row.total }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2">No report data available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
